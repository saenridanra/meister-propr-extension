<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meister ProPR — Settings</title>
</head>
<body>
    <div id="settings-root">
        <h2>Meister ProPR — Settings</h2>

        <div class="form-group">
            <label for="backend-url">Backend URL</label>
            <input type="url" id="backend-url" placeholder="https://your-backend.example.com">
        </div>

        <div class="form-group">
            <label for="client-key">Client Key</label>
            <input type="password" id="client-key" placeholder="Your client key">
        </div>

        <div class="form-group">
            <label for="client-id">Client ID</label>
            <input type="text" id="client-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
        </div>

        <hr class="section-divider">
        <h3>Crawl Configuration</h3>
        <p class="section-description">
            Set a reviewer display name to enable automatic pull request crawling for this project.
            Leave blank to disable crawling.
        </p>

        <div class="form-group">
            <label for="reviewer-display-name">Reviewer Display Name</label>
            <input type="text" id="reviewer-display-name"
                   placeholder="e.g. John Smith or service-principal-name">
            <div id="reviewer-hint" class="input-hint"></div>
        </div>

        <button id="save-btn">Save Settings</button>
        <div id="status-message"></div>
    </div>

    <script src="dist/settings.js"></script>
</body>
</html>
